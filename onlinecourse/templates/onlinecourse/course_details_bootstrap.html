<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid">
        <h2>{{ course.name }}</h2>
        <div class="card-columns">
            {% for lesson in course.lesson_set.all %}
            <div class="card mt-1">
                <div class="card-header">{{ lesson.title }}</div>
                <div class="card-body">{{ lesson.content }}</div>
            </div>
            {% endfor %}
        </div>
        <button class="btn btn-primary btn-block" data-toggle="collapse" data-target="#exam">Start Exam</button>
        <div id="exam" class="collapse">
            <form action="{% url 'onlinecourse:submit' course.id %}" method="post">
                {% csrf_token %}
                {% for question in course.question_set.all %}
                <div class="card mt-1">
                    <div class="card-header">
                        <h5>{{ question.content }}</h5>
                    </div>
                    {% for choice in question.choice_set.all %}
                    <div class="form-check">
                        <label class="form-check-label">
                            <input type="checkbox" name="choice_{{ choice.id }}" class="form-check-input" id="{{ choice.id }}" value="{{ choice.id }}">{{ choice.content }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
                {% endfor %}
                <input class="btn btn-success btn-block" type="submit" value="Submit">
            </form>
        </div>
    </div>
</body>
</html>
